upstream pisignage_backend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name _; # Replace with your domain (e.g. signage.example.com) before running certbot

    # Redirect HTTP to HTTPS (uncomment after SSL is configured)
    # return 301 https://$host$request_uri;

    # For initial setup without SSL, proxy directly
    location / {
        proxy_pass http://pisignage_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for all piSignage socket transports
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Increase timeouts for socket.io long-polling
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Large file uploads (video assets)
        client_max_body_size 2G;
    }

    # Socket.io paths (old, new, websocket-only)
    location /socket.io/ {
        proxy_pass http://pisignage_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location /newsocket.io/ {
        proxy_pass http://pisignage_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location /wssocket.io/ {
        proxy_pass http://pisignage_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location /websocket {
        proxy_pass http://pisignage_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}

