<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>piSignage Custom Layout with Overlay</title>
    <!--
        Custom piSignage layout with integrated scan overlay.

        This layout is loaded by the piSignage player as a custom HTML layout.
        It provides:
          1. A fullscreen main zone (#main) for piSignage-managed content (video/images)
          2. An overlay layer (#overlay) that connects to the server via WebSocket
             and displays scan action states (processing, product, no_match, etc.)

        To use: Upload this file as an asset to piSignage, then select it as
        the custom layout for the group's playlist.
    -->
    <link rel="stylesheet" href="/overlay/overlay.css">
</head>
<body>
    <!-- Main content zone - piSignage injects video/image content here -->
    <div id="main" class="zone" style="position:absolute;left:0;top:0;width:100%;height:100%;z-index:1;"></div>

    <!-- Scan overlay - hidden by default, shown on barcode events -->
    <div id="overlay" class="overlay-container">
        <div id="overlay-content" class="overlay-content">
            <!-- Processing state -->
            <div id="state-processing" class="overlay-state">
                <div class="overlay-spinner"></div>
                <div class="overlay-message">Verifying item...</div>
            </div>

            <!-- Deposit waiting state -->
            <div id="state-deposit_waiting" class="overlay-state">
                <div class="overlay-icon">&#x1F4E6;</div>
                <div class="overlay-message">Please deposit your item</div>
            </div>

            <!-- Product display state -->
            <div id="state-product_display" class="overlay-state">
                <img id="product-image" class="overlay-product-image" alt="Product">
                <div id="product-name" class="overlay-product-name"></div>
            </div>

            <!-- No match state -->
            <div id="state-no_match" class="overlay-state">
                <div class="overlay-icon overlay-icon-error">&#x2717;</div>
                <div class="overlay-message">Item not recognized</div>
                <div class="overlay-submessage">Cannot accept this item</div>
            </div>

            <!-- QR not allowed state -->
            <div id="state-qr_not_allowed" class="overlay-state">
                <div class="overlay-icon overlay-icon-warning">&#x26A0;</div>
                <div class="overlay-message">QR codes not accepted</div>
                <div class="overlay-submessage">Please scan a barcode</div>
            </div>

            <!-- Recycle failure state -->
            <div id="state-recycle_failure" class="overlay-state">
                <div class="overlay-icon overlay-icon-error">&#x2717;</div>
                <div class="overlay-message">Item not detected</div>
                <div class="overlay-submessage">Please try again</div>
            </div>
        </div>

        <!-- Connection status indicator -->
        <div id="overlay-status" class="overlay-status"></div>
    </div>

    <script src="/overlay/overlay-client.js"></script>
</body>
</html>
